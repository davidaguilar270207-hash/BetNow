<!DOCTYPE html>
<html lang="es-es">
    <head>
        <title>BetNow</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="barranav">
            <div class="logo">BET<span>NOW</span></div>
            <nav>
                <!--Aqui tengo que cambiar el href para que lleve a otra página en vez de a la misma-->
                <a href="#">Deportes</a>
                <a href="#">En vivo</a>
                <a href="#">Casino</a>
            </nav>
            <div class="botones_usu">
                <form>
                <button class="logearse" type="submit" formaction="log.html">Crear Cuenta</button>
                <button class="iniciar">Iniciar Sesión</button>
                </form>
            </div>
        </header>
        
        <main class="principal">
            <div class="barralat">
                <h3>Populares❗</h3>
                <ul>
                    <li>⚽ Fútbol</li>
                    <li>🏀 Baloncesto</li>
                    <li>🎾 Tenis</li>
                </ul>
            </div>
            <div class="content">
                <div class="banner">
                    <h2>Bono de Bienvenida: ¡Gana hasta 200€ en bonos de apuestas!</h2>
                </div>
                <div class="apen-vivo">
                    <h3>Apuestas en Vivo</h3>
                    <div class="apu-card">
                        <div class="equipos">Atletico de Madrid vs Real Madrid</div>
                        <div class="cuotas">
                            <button>1,50</button>
                            <button>4,20</button>
                            <button>6,80</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="Cupones">
                <h3>Tu Cupón</h3>
                <div class="cupón">
                    <p>Atletico de Madrid a Ganar</p>
                    <span>Cuota: 1,50€</span>
                </div>
                <div class="input-apuesta">
                    <input type="number" placeholder="Importe (€)">
                    <button class="apostar">Apostar</button>
                </div>
            </div>
        </main>
    </body>
</html>
